apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo
  namespace: observability
  labels:
    app.kubernetes.io/instance: tempo
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: tempo
data:
  overrides.yaml: |
    overrides:
      {}
  tempo.yaml: |
    memberlist:
      cluster_label: "tempo.observability"
    multitenancy_enabled: false
    usage_report:
      reporting_enabled: true
    compactor:
      compaction:
        block_retention: 72h
    distributor:
      receivers:
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
            thrift_http:
              endpoint: 0.0.0.0:14268
        opencensus: null
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester: {}
    server:
      http_listen_port: 3100
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    querier: {}
    query_frontend: {}
    overrides:
      max_traces_per_user: 0
      per_tenant_override_config: ""
    metrics_generator:
      storage:
        path: "/tmp/tempo"
        remote_write:
          - url: http://monitoring-kube-prometheus-prometheus.observability:9090/api/v1/write
      processor:
        service_graphs:
          max_items: 10000
          wait: 10s
          workers: 10
        span_metrics:
          enable_target_info: true
