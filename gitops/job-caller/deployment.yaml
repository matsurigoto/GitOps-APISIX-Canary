# =============================================================================
# API Caller — Continuous traffic generator (every 5 seconds)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-caller
  namespace: app
  labels:
    app: api-caller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-caller
  template:
    metadata:
      labels:
        app: api-caller
    spec:
      containers:
        - name: caller
          image: curlimages/curl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting API caller - hitting APISIX every 5 seconds"
              APISIX="http://apisix-gateway.ingress-apisix:80"
              call() {
                LABEL=$1; ENDPOINT=$2; shift 2
                TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
                RESP=$(curl -s -w "\n%{http_code}" "$@" "${APISIX}${ENDPOINT}" 2>/dev/null)
                HTTP_CODE=$(echo "$RESP" | tail -1)
                BODY=$(echo "$RESP" | head -1)
                echo "${TIMESTAMP} | ${LABEL} | ${ENDPOINT} | HTTP ${HTTP_CODE} | ${BODY}"
              }
              while true; do
                # /api/hello — stable & canary
                call stable  /api/hello
                sleep 1
                call canary  /api/hello -H "x-canary: true"
                sleep 1

                # /api/health — stable & canary
                call stable  /api/health
                sleep 1
                call canary  /api/health -H "x-canary: true"
                sleep 1

                # /api/info — stable & canary
                call stable  /api/info
                sleep 1
                call canary  /api/info -H "x-canary: true"
                sleep 1

                # /api/slow — canary only (8s response time)
                call canary  /api/slow -H "x-canary: true"
                sleep 1
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
